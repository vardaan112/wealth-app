services:
  postgres:
    image: postgres:16-alpine
    container_name: wealth-postgres
    environment:
      POSTGRES_USER: wealth
      POSTGRES_PASSWORD: wealth
      POSTGRES_DB: wealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealth -d wealth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
